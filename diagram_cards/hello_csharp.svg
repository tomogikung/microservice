<text x="840" y="236" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  4.1 mcr.microsoft.com/dotnet/sdk:8.0</text>
<text x="840" y="258" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    4.1.1 /src</text>
