<text x="72" y="1108" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - Program.cs</text>
<text x="72" y="1130" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - hello_csharp.csproj</text>
<text x="72" y="1152" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - Dockerfile</text>
