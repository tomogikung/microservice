<text x="1202" y="88" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#f8fafc">SVG</text>
<rect x="48" y="150" width="736" height="632" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="48" y="150" width="736" height="56" rx="8" fill="#65a30d" />
<rect x="48" y="198" width="736" height="8" fill="#65a30d" />
<text x="68" y="184" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Real World</text>
<text x="72" y="236" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  FROM debian:bookworm-slim</text>
<text x="72" y="258" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="280" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN apt-get update \</text>
<text x="72" y="302" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; apt-get install -y --no-install-recommends bash netcat-openbsd coreutils sed </text>
<text x="72" y="324" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    tzdata \</text>
<text x="72" y="346" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; rm -rf /var/lib/apt/lists/* \</text>
<text x="72" y="368" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; useradd -r -m -d /app appuser</text>
<text x="72" y="390" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="412" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  WORKDIR /app</text>
<text x="72" y="434" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="456" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY server.sh ./</text>
<text x="72" y="478" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="500" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN chmod +x /app/server.sh \</text>
<text x="72" y="522" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; mkdir -p /app/events/pending \</text>
<text x="72" y="544" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; chown -R appuser:appuser /app</text>
<text x="72" y="566" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="588" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  ENV APP_HOST=0.0.0.0</text>
<text x="72" y="610" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  ENV PORT=3008</text>
<text x="72" y="632" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="654" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  EXPOSE 3008</text>
<text x="72" y="676" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="698" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  USER appuser</text>
<text x="72" y="720" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="742" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  CMD ["bash", "server.sh"]</text>
<rect x="48" y="806" width="736" height="126" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="48" y="806" width="736" height="56" rx="8" fill="#9333ea" />
<rect x="48" y="854" width="736" height="8" fill="#9333ea" />
<text x="68" y="840" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Command</text>
<text x="72" y="892" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">docker build -t hello-bash .</text>
<rect x="48" y="956" width="736" height="148" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="48" y="956" width="736" height="56" rx="8" fill="#ca8a04" />
<rect x="48" y="1004" width="736" height="8" fill="#ca8a04" />
<text x="68" y="990" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Context</text>
<text x="72" y="1042" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - server.sh</text>
<text x="72" y="1064" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - Dockerfile</text>
<rect x="816" y="150" width="736" height="148" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="816" y="150" width="736" height="56" rx="8" fill="#16a34a" />
<rect x="816" y="198" width="736" height="8" fill="#16a34a" />
<text x="836" y="184" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Build Stage</text>
<text x="840" y="236" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  4.1 none</text>
<text x="840" y="258" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    4.1.1 this project runs the shell script directly</text>
<rect x="816" y="322" width="736" height="236" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="816" y="322" width="736" height="56" rx="8" fill="#ea580c" />
<rect x="816" y="370" width="736" height="8" fill="#ea580c" />
<text x="836" y="356" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Runtime Stage</text>
<text x="840" y="408" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  5.1 Docker image</text>
<text x="840" y="430" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">      5.1.1 hello-bash</text>
<text x="840" y="452" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">        5.1.1.1 debian:bookworm-slim</text>
<text x="840" y="474" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">          5.1.1.1.1 /app</text>
<text x="840" y="496" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">            - server.sh</text>
<text x="840" y="518" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">            - events</text>
