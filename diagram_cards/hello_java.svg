<text x="68" y="184" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Real World</text>
<text x="72" y="236" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  FROM maven:3.9.9-eclipse-temurin-17 AS builder</text>
<text x="72" y="258" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="280" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  WORKDIR /app</text>
<text x="72" y="302" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY pom.xml ./</text>
<text x="72" y="324" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY src ./src</text>
<text x="72" y="346" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN mvn -q -DskipTests package</text>
<text x="72" y="368" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="390" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  FROM eclipse-temurin:17-jre-jammy</text>
<text x="72" y="412" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="434" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN useradd -r -m -d /app appuser</text>
<text x="72" y="456" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="478" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  WORKDIR /app</text>
<text x="72" y="500" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="522" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY --from=builder /app/target/hello_java-0.1.0.jar /app/hello_java.jar</text>
<text x="72" y="544" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="566" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN mkdir -p /app/events \</text>
<text x="72" y="588" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; chown -R appuser:appuser /app</text>
<text x="72" y="610" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="632" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  ENV APP_HOST=0.0.0.0</text>
<text x="72" y="654" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  ENV PORT=3006</text>
<text x="72" y="676" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="698" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  EXPOSE 3006</text>
<text x="72" y="720" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="742" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  USER appuser</text>
<text x="72" y="764" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="786" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  CMD ["java", "-jar", "/app/hello_java.jar"]</text>
<rect x="48" y="850" width="736" height="126" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
