<text x="72" y="1086" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - pom.xml</text>
<text x="72" y="1108" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - src/main/java/com/example/hello_java/</text>
