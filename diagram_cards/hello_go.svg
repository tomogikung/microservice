<text x="1202" y="88" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#f8fafc">SVG</text>
<rect x="48" y="150" width="736" height="676" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="48" y="150" width="736" height="56" rx="8" fill="#0f766e" />
<rect x="48" y="198" width="736" height="8" fill="#0f766e" />
<text x="68" y="184" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Real World</text>
<text x="72" y="236" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  FROM golang:1.22-bookworm AS builder</text>
<text x="72" y="258" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="280" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  WORKDIR /app</text>
<text x="72" y="302" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY go.mod ./</text>
<text x="72" y="324" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY main.go ./</text>
<text x="72" y="346" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN CGO_ENABLED=0 GOOS=linux go build -o hello_go .</text>
<text x="72" y="368" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="390" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  FROM debian:bookworm-slim</text>
<text x="72" y="412" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="434" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  RUN apt-get update \</text>
<text x="72" y="456" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; apt-get install -y --no-install-recommends ca-certificates \</text>
<text x="72" y="478" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; rm -rf /var/lib/apt/lists/* \</text>
<text x="72" y="500" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    &amp;&amp; useradd -r -m -d /app appuser</text>
<text x="72" y="522" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="544" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  WORKDIR /app</text>
<text x="72" y="566" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="588" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  COPY --from=builder /app/hello_go /usr/local/bin/hello_go</text>
<text x="72" y="610" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="632" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  ENV APP_HOST=0.0.0.0</text>
<text x="72" y="654" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  ENV PORT=3001</text>
<text x="72" y="676" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="698" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  EXPOSE 3001</text>
<text x="72" y="720" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="742" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  USER appuser</text>
<text x="72" y="764" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve"></text>
<text x="72" y="786" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  CMD ["hello_go"]</text>
<rect x="48" y="850" width="736" height="126" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="48" y="850" width="736" height="56" rx="8" fill="#ea580c" />
<rect x="48" y="898" width="736" height="8" fill="#ea580c" />
<text x="68" y="884" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Command</text>
<text x="72" y="936" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">docker build -t hello-go .</text>
<rect x="48" y="1000" width="736" height="170" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="48" y="1000" width="736" height="56" rx="8" fill="#ca8a04" />
<rect x="48" y="1048" width="736" height="8" fill="#ca8a04" />
<text x="68" y="1034" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Context</text>
<text x="72" y="1086" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - main.go</text>
<text x="72" y="1108" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - go.mod</text>
<text x="72" y="1130" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  - Dockerfile</text>
<rect x="816" y="150" width="736" height="214" rx="8" fill="#1f2428" stroke="#3d464d" stroke-width="1.2" />
<rect x="816" y="150" width="736" height="56" rx="8" fill="#16a34a" />
<rect x="816" y="198" width="736" height="8" fill="#16a34a" />
<text x="836" y="184" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Build Stage</text>
<text x="840" y="236" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  4.1 golang:1.22-bookworm</text>
<text x="840" y="258" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">    4.1.1 /app</text>
<text x="840" y="280" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">      - main.go</text>
<text x="840" y="302" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">      - go.mod</text>
<text x="840" y="324" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">      - hello_go</text>
