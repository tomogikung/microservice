<rect x="816" y="436" width="736" height="8" fill="#ea580c" />
<text x="836" y="422" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Runtime Stage</text>
<text x="840" y="474" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">  5.1 Docker image</text>
<text x="840" y="496" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">      5.1.1 hello-go</text>
<text x="840" y="518" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">        5.1.1.1 debian:bookworm-slim</text>
<text x="840" y="540" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">          5.1.1.1.1 /usr/local/bin/hello_go</text>
<text x="840" y="562" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">            - hello_go</text>
<text x="840" y="584" font-family="Menlo, Consolas, monospace" font-size="15" fill="#e5e7eb" xml:space="preserve">          5.1.1.1.2 /app</text>
